{% for post in site.posts %}
<div style="display:flex;gap:1.5rem;align-items:flex-start;margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid #e5e5e0;">
  {% if post.header.teaser %}
  <a href="{{ post.url }}" style="flex-shrink:0;">
    <img src="{{ post.header.teaser }}" alt="{{ post.title }}" style="width:200px;height:140px;object-fit:cover;">
  </a>
  {% endif %}
  <div>
    <h2 style="font-family:Georgia,serif;font-size:1.2rem;font-weight:normal;margin:0 0 0.5rem 0;">
      <a href="{{ post.url }}" style="color:#1a1a1a;text-decoration:none;">{{ post.title }}</a>
    </h2>
    <p style="font-size:0.8rem;color:#aaa;margin:0 0 0.5rem 0;">{{ post.date | date: "%B %d, %Y" }}</p>
    <p style="font-size:0.95rem;color:#444;margin:0;">{{ post.excerpt | strip_html | truncate: 150 }}</p>
    <a href="{{ post.url }}" style="display:inline-block;margin-top:0.8rem;font-size:0.8rem;color:#1a1a1a;text-decoration:underline;">Leer más →</a>
  </div>
</div>
{% endfor %}
