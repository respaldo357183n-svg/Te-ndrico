<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teándrico</title>

<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --accent: #1a1a1a;
  --accent-light: #f5f5f5;
  --border: #e5e5e0;
  --gold: #f5c842;
  --font-serif: 'Georgia', 'Times New Roman', serif;
  --font-sans: 'Helvetica Neue', Arial, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.7;
}

/* NAV */
nav { border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; z-index:100; }
.nav-inner { max-width:1100px; margin:auto; padding:0 2rem; display:flex; justify-content:space-between; align-items:center; height:120px; }

/* CARDS */
.articles-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:2rem;
  padding:2rem;
  max-width:1100px;
  margin:auto;
}

.card {
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
  overflow:hidden;
  background:#fff;
}

.card:hover {
  transform:translateY(-4px);
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

.card-image {
  height:180px;
  background-size:cover;
  background-position:center;
}

.card-content {
  padding:1.5rem;
}

.card-cat {
  font-size:.7rem;
  background:var(--gold);
  display:inline-block;
  padding:.2rem .5rem;
  margin-bottom:.6rem;
}

.card h3 {
  font-family:var(--font-serif);
  font-weight:normal;
  margin-bottom:.6rem;
}

.card p {
  font-size:.9rem;
  color:var(--muted);
}

/* ARTICLE */
.article-view {
  max-width:720px;
  margin:auto;
  padding:3rem 2rem;
}

.article-title {
  font-family:var(--font-serif);
  font-size:2rem;
  margin-bottom:1rem;
}

.article-meta {
  color:#aaa;
  margin-bottom:2rem;
}

.article-cover img {
  width:100%;
  margin:2rem 0;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.article-body {
  font-family:var(--font-serif);
  text-align:justify;
}

.article-body p:first-of-type::first-letter {
  font-size:2.8rem;
  float:left;
  padding-right:6px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <div class="articles-grid" id="home-grid"></div>
</div>

<!-- ARTICLE -->
<div id="article" style="display:none;">
  <div class="article-view" id="article-content"></div>
</div>

<script>
const articles = [
{
  id:1,
  cat:"Teología Bíblica",
  title:"Henoteísmo: pensamientos acerca del Israel premonoteísta",
  summary:"Una exploración de la evolución religiosa del pueblo de Israel...",
  date:"5 de abril, 2026",
  author:"Estiben Álvarez",
  image:"imagenes/articulo-henoteismo.jpg",
  body:`
  <p>Que las religiones del mundo han evolucionado profundamente a lo largo de la historia...</p>

  <p>El henoteísmo representa una etapa intermedia clave entre el politeísmo y el monoteísmo...</p>

  <h3>Una categoría teológica útil</h3>
  <p>Esta categoría permite comprender mejor las tensiones religiosas antiguas...</p>

  <h3>Conclusión</h3>
  <p>Las religiones son procesos dinámicos que evolucionan históricamente...</p>
  `
}
];

function renderCards() {
  const el = document.getElementById("home-grid");

  el.innerHTML = articles.map(a => `
    <div class="card" onclick="openArticle(${a.id})">
      <div class="card-image" style="background-image:url('${a.image}')"></div>
      <div class="card-content">
        <div class="card-cat">${a.cat}</div>
        <h3>${a.title}</h3>
        <p>${a.summary}</p>
      </div>
    </div>
  `).join("");
}

function openArticle(id){
  const a = articles.find(x=>x.id===id);

  document.getElementById("home").style.display="none";
  document.getElementById("article").style.display="block";

  document.getElementById("article-content").innerHTML = `
    <h1 class="article-title">${a.title}</h1>
    <div class="article-meta">${a.date} · ${a.author}</div>

    <div class="article-cover">
      <img src="${a.image}">
    </div>

    <div class="article-body">${a.body}</div>

    <br><br>
    <button onclick="goBack()">← Volver</button>
  `;
}

function goBack(){
  document.getElementById("home").style.display="block";
  document.getElementById("article").style.display="none";
}

renderCards();
</script>

</body>
</html>
